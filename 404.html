<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SWEATY BEASTS</title>
  <script>
    // GitHub Pages SPA redirect: encode the path into a query string
    // so index.html can restore it via history.replaceState.
    // pathSegmentsToKeep=0 because the app is served from the root
    // of a custom domain (sweatybeasts.com), not a sub-path.
    var pathSegmentsToKeep = 0;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
